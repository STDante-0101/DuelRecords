services:
  duelrecords-api:
    build:
      context: ./DuelRecords.Api
    container_name: duelrecords-api
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__MundoZeroConnection=Host=192.168.0.2;Port=5432;Database=DuelRecords_MundoZero;Username=duelrecords;Password=duelrecords123
      - ConnectionStrings__AlexandriaConnection=Host=192.168.0.2;Port=5432;Database=DuelRecords_Alexandria;Username=duelrecords;Password=duelrecords123

  duelrecords-blazor:
    build:
      context: ./DuelRecords.Blazor
    container_name: duelrecords-blazor
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ApiSettings__BaseUrl=http://duelrecords-api:8080
    depends_on:
      - duelrecords-api
    volumes:
      - blazor-uploads:/app/wwwroot/uploads

volumes:
  blazor-uploads:
