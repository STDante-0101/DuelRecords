services:
  duelrecords-api:
    build:
      context: ./DuelRecords.Api
    container_name: duelrecords-api
    ports:
      - "5001:8080"
    volumes:
      - ./data:/app/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/duelrecords.db

  duelrecords-blazor:
    build:
      context: ./DuelRecords.Blazor
    container_name: duelrecords-blazor
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ApiSettings__BaseUrl=http://duelrecords-api:8080
    depends_on:
      - duelrecords-api